<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@900&amp;display=swap');
      .logo-text {
        font-family: 'DM Sans', sans-serif;
        font-weight: 900;
        font-size: 28px;
        letter-spacing: -0.04em;
      }
      .color-dark { fill: #0D0D12; }
      .color-purple { fill: #5A3FFF; }
    </style>
    
    <linearGradient id="icon-grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <linearGradient id="icon-grad-green" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E676" />
      <stop offset="100%" stop-color="#00B86B" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#FFFFFF" />

  <g transform="translate(25, 0)">
    <g transform="translate(4, 9)">
      <rect x="0" y="0" width="16" height="16" rx="5" fill="url(#icon-grad-purple)" />
      <rect x="12" y="12" width="16" height="16" rx="5" fill="url(#icon-grad-green)" opacity="0.95" />
      <circle cx="20" cy="4" r="3.5" fill="#FF2D55" />
    </g>
    
    <text x="44" y="34" class="logo-text">
      <tspan class="color-dark">Go</tspan><tspan class="color-purple">Shiet</tspan>
    </text>
  </g>
</svg>
