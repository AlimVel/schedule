<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход в систему — GoShiet</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple: #5A3FFF;
    --purple-light: #E8E5FF;
    --green: #00E676;
    --green-bright: #14FF00;
    --blue: #0084FF;
    --yellow: #FFD600;
    --pink: #FF2D55;
    --black: #0D0D12;
    --white: #FFFFFF;
    --gray: #F0F0F5;
    --text-gray: #4A4A5A;
    --orange: #FF6B00;
    
    --shadow-premium: 0 20px 60px rgba(90, 63, 255, 0.15), 0 8px 24px rgba(13,13,18,0.08);
  }

  body { 
    font-family: 'DM Sans', sans-serif; 
    color: var(--black); 
    background: 
      radial-gradient(circle at 0% 0%, rgba(90, 63, 255, 0.12), transparent 35%),
      radial-gradient(circle at 100% 15%, rgba(0, 230, 118, 0.12), transparent 30%),
      radial-gradient(circle at 50% 100%, rgba(255, 45, 85, 0.08), transparent 40%),
      linear-gradient(180deg, #FAFAFF 0%, #F0F2FF 48%, #FAFAFF 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Фоновые орбы */
  .hero-grid-overlay { position: absolute; inset: 0; background-image: radial-gradient(rgba(90, 63, 255, 0.15) 1.5px, transparent 1.5px); background-size: 32px 32px; opacity: 0.7; z-index: 0; }
  .hero-glow-orb { position: absolute; border-radius: 50%; filter: blur(100px); z-index: 0; opacity: 0.6; animation: pulseFloat 10s ease-in-out infinite alternate; }
  .orb-1 { width: 650px; height: 650px; background: var(--purple); top: -200px; right: -150px; }
  .orb-2 { width: 500px; height: 500px; background: var(--green); bottom: -150px; left: -100px; animation-delay: -3s; }

  @keyframes pulseFloat { 0%,100% { transform: scale(1) translateY(0); opacity: 0.5; } 50% { transform: scale(1.1) translateY(-15px); opacity: 0.3; } }

  /* Навигация (возврат) */
  .back-nav {
    position: absolute;
    top: 24px; left: 24px;
    z-index: 10;
  }
  .back-btn {
    display: flex; align-items: center; gap: 8px;
    text-decoration: none; color: var(--text-gray);
    font-size: 0.95rem; font-weight: 700;
    padding: 10px 18px; border-radius: 14px;
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(255,255,255,0.9);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    transition: all 0.3s ease;
  }
  .back-btn:hover { background: #fff; color: var(--black); box-shadow: 0 8px 20px rgba(13,13,18,0.08); transform: translateX(-4px); }

  /* Контейнер авторизации */
  .auth-wrapper {
    position: relative;
    z-index: 5;
    width: 100%;
    max-width: 460px;
    padding: 0 20px;
  }

  .auth-card {
    background: rgba(255,255,255,0.85);
    border: 1px solid rgba(255,255,255,0.95);
    border-radius: 36px;
    padding: 48px 40px;
    box-shadow: var(--shadow-premium);
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    position: relative;
    overflow: hidden;
    min-height: 640px; /* Увеличено для кнопок */
  }

  .nav-logo { font-size: 2rem; font-weight: 900; letter-spacing: -0.04em; color: var(--black); text-decoration: none; display: block; text-align: center; margin-bottom: 32px; }
  .nav-logo span { color: var(--purple); background: none; -webkit-background-clip: unset; -webkit-text-fill-color: var(--purple); }

  /* Анимация переключения форм */
  .forms-container {
    position: relative;
    width: 100%;
    height: 460px;
  }

  .auth-form {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .sign-in-form { opacity: 1; transform: translateX(0); pointer-events: all; }
  .sign-up-form { opacity: 0; transform: translateX(50px); pointer-events: none; }

  /* Состояние регистрации */
  .auth-card.sign-up-mode .sign-in-form { opacity: 0; transform: translateX(-50px); pointer-events: none; }
  .auth-card.sign-up-mode .sign-up-form { opacity: 1; transform: translateX(0); pointer-events: all; }

  .auth-title { font-size: 1.5rem; font-weight: 900; color: var(--black); margin-bottom: 8px; letter-spacing: -0.03em; text-align: center; }
  .auth-subtitle { font-size: 0.9rem; font-weight: 600; color: var(--text-gray); margin-bottom: 32px; text-align: center; line-height: 1.5; }

  .input-group { margin-bottom: 16px; position: relative; }
  .input-group label { display: block; font-size: 0.8rem; font-weight: 800; color: var(--black); margin-bottom: 8px; margin-left: 4px; }
  .input-field {
    width: 100%;
    background: rgba(13,13,18,0.03);
    border: 1px solid rgba(13,13,18,0.08);
    border-radius: 16px;
    padding: 16px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem; font-weight: 600; color: var(--black);
    transition: all 0.3s ease;
  }
  .input-field::placeholder { color: #A0A0B0; font-weight: 500; }
  .input-field:focus { 
    background: #fff; 
    border-color: var(--purple); 
    outline: none; 
    box-shadow: 0 0 0 4px rgba(90,63,255,0.15); 
  }

  .forgot-pass { display: block; text-align: right; font-size: 0.8rem; font-weight: 700; color: var(--purple); text-decoration: none; margin-top: 8px; margin-bottom: 24px; transition: color 0.2s; }
  .forgot-pass:hover { color: var(--black); }

  /* Кнопки */
  .btn-primary-lg { 
    width: 100%; 
    background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%); 
    color: #fff; border: none; border-radius: 16px; 
    padding: 16px; font-size: 1rem; font-weight: 800; 
    cursor: pointer; transition: all 0.3s ease; 
    box-shadow: 0 8px 24px rgba(90,63,255,0.35); 
    font-family: 'DM Sans', sans-serif; 
    margin-bottom: 12px;
  }
  .btn-primary-lg:hover { transform: translateY(-2px); box-shadow: 0 16px 40px rgba(90,63,255,0.5); }

  /* Новая контурная кнопка для переключения */
  .btn-outline {
    width: 100%;
    background: transparent;
    color: var(--black);
    border: 1px solid rgba(13,13,18,0.15);
    border-radius: 16px;
    padding: 15px;
    font-size: 0.95rem;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: 'DM Sans', sans-serif;
    margin-bottom: 24px;
  }
  .btn-outline:hover {
    border-color: var(--purple);
    color: var(--purple);
    background: rgba(90,63,255,0.04);
  }

  .divider { display: flex; align-items: center; text-align: center; margin-bottom: 24px; }
  .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(13,13,18,0.1); }
  .divider span { padding: 0 10px; font-size: 0.75rem; font-weight: 700; color: var(--text-gray); text-transform: uppercase; letter-spacing: 0.05em; }

  .social-login { display: flex; gap: 12px; }
  .btn-social {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px;
    background: #fff; border: 1px solid rgba(13,13,18,0.1);
    border-radius: 14px; padding: 14px; font-size: 0.9rem; font-weight: 700; color: var(--black);
    cursor: pointer; transition: all 0.25s ease;
  }
  .btn-social:hover { background: rgba(13,13,18,0.02); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(13,13,18,0.06); }
  .btn-social svg { width: 20px; height: 20px; }

@media (max-width: 480px) {
    /* 1. Отключаем flex на телефоне, чтобы вернуть естественный скролл и расположение */
    body {
      display: block;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 80px 0 40px; /* Отступ сверху (под кнопку) и снизу */
      background-attachment: fixed;
    }

    /* 2. Центрируем карточку строго по центру экрана */
    .auth-wrapper {
      margin: 0 auto;
    }

    /* 3. Кнопку "Назад" жестко прибиваем в левый верхний угол */
    .back-nav {
      position: absolute;
      top: 16px;
      left: 16px;
    }
    .back-btn {
      padding: 8px 14px;
      font-size: 0.85rem;
    }

    /* 4. Компактная карточка без дыры снизу */
    .auth-card {
      padding: 32px 20px;
      border-radius: 28px;
      min-height: auto;
    }

    /* 5. Заставляем форму занимать свою естественную высоту */
    .forms-container { height: auto; }
    .auth-form { position: relative; }

    .nav-logo { font-size: 1.8rem; margin-bottom: 24px; }
  }
</style>
</head>
<body>

<div class="hero-grid-overlay"></div>
<div class="hero-glow-orb orb-1"></div>
<div class="hero-glow-orb orb-2"></div>

<div class="back-nav">
  <a href="index.html" class="back-btn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    На главную
  </a>
</div>

<div class="auth-wrapper">
  <div class="auth-card" id="authCard">
    <a href="#" class="nav-logo">Go<span>Shiet</span></a>

    <div class="forms-container">
      
      <form class="auth-form sign-in-form" method="POST" action="{% url 'auth' %}">
        {% csrf_token %}
        <h2 class="auth-title">С возвращением!</h2>
        <p class="auth-subtitle">Войдите, чтобы управлять расписанием.</p>

        {% if error %}
          <p style="color: var(--pink); text-align: center; font-weight: bold; margin-bottom: 16px;">
            {{ error }}
          </p>
        {% endif %}

        <div class="input-group">
          <label>Login</label>
          <input type="text" name="username" class="input-field" placeholder="Ваш логин" required>
        </div>
        <div class="input-group">
          <label>Пароль</label>
          <input type="password" name="password" class="input-field" placeholder="••••••••" required>
          <a href="#" class="forgot-pass">Забыли пароль?</a>
        </div>

        <button type="submit" class="btn-primary-lg">Войти в систему</button>
      </form>


    </div>
  </div>
</div>

<script>
  const authCard = document.getElementById('authCard');
  //const toRegisterBtn = document.getElementById('toRegister');
  //const toLoginBtn = document.getElementById('toLogin');

  toRegisterBtn.addEventListener('click', () => {
    authCard.classList.add('sign-up-mode');
  });

  toLoginBtn.addEventListener('click', () => {
    authCard.classList.remove('sign-up-mode');
  });
</script>

</body>
</html>
